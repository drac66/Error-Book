name: error_book_mobile
description: mobile client
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.5
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/seed_mistakes.json
    - assets/splash_logo.png
    - assets/icon_source.png

flutter_launcher_icons:
  android: true
  image_path: assets/icon_source.png
  min_sdk_android: 21
